name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: yarn
      - uses: actions/cache@v4
        with:
          path: .cache
          key: gatsby-cache-${{ runner.os }}-${{ hashFiles('package.json', 'yarn.lock', 'gatsby-config.ts', 'gatsby-node.ts') }}
          restore-keys: |
            gatsby-cache-${{ runner.os }}-
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: yarn typecheck
      - run: yarn ci:lint
      - uses: actions/upload-artifact@v4
        with:
          name: gatsby-public
          path: public
          retention-days: 1

  lighthouse:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: gatsby-public
          path: public
      - run: npx --yes @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
